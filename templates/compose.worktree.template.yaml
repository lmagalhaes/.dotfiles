# compose.worktree.SLUG.yaml
# Generated for worktree: SLUG
#
# This file only contains what differs from compose.override.yaml:
# - Unique container names (prevents collision with main or other worktrees)
# - Traefik routing labels (per-branch hostname)
#
# Mount path and GIT_DIR are set via .env.SLUG (generated alongside this file).
# Base service config (PHP, nginx, volumes, healthcheck) comes from compose.override.yaml.
#
# Do not edit manually - regenerate with: git wt-docker init

services:
  nginx:
    container_name: nginx-SLUG
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.workyard-api-SLUG.loadbalancer.server.port=80"
      - "traefik.http.routers.workyard-api-SLUG.rule=Host(`api-SLUG.workyard.test`)"
      - "traefik.http.routers.workyard-api-SLUG.tls=true"

  workyard-api:
    container_name: workyard-api-SLUG
    hostname: api-SLUG.workyard.test
